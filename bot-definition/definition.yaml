  - kind: ConnectorDefinition
    connectorId: /providers/Microsoft.PowerApps/apis/shared_github
    version: 639129050071820400
    displayName: GitHub
    description: GitHub is a web-based Git repository hosting service. It offers all of the distributed revision control and source code management (SCM) functionality of Git as well as adding its own features.
    connectorType: Public
    iconUri: https://static.powerapps.com/resource/ppcr/releases/v1.0.1808/1.0.1808.4692/Github/icon.png
    changedTime: 2026-04-27T16:43:27.1820357Z
    hasPublicData: false
    isSSOSupported: false
    operations:
      - kind: ConnectorOperation
        displayName: Get all issues of a repository
        description: Get all issues of a repository.
        inputType:
          kind: Record
          properties:
            assignee:
              kind: PropertyInfo
              displayName: assignee
              description: Filter by assignee.
              order: 4
              type:
                kind: String
            creator:
              kind: PropertyInfo
              displayName: creator
              description: Filter by creator.
              order: 5
              type:
                kind: String
            direction:
              kind: PropertyInfo
              displayName: direction
              description: Direction of sort.
              order: 9
              type:
                kind: String
            labels:
              kind: PropertyInfo
              displayName: labels
              description: Filter by label names.
              order: 7
              type:
                kind: String
            mentioned:
              kind: PropertyInfo
              displayName: mentioned
              description: Filter by mentions.
              order: 6
              type:
                kind: String
            milestone:
              kind: PropertyInfo
              displayName: milestone
              description: Filter by milestone.
              order: 2
              type:
                kind: String
            page:
              kind: PropertyInfo
              displayName: page
              description: Page number to display.
              order: 12
              type:
                kind: Number
            per_page:
              kind: PropertyInfo
              displayName: per_page
              description: Number of results per page.
              order: 11
              type:
                kind: Number
            repositoryName:
              kind: PropertyInfo
              displayName: Repository Name
              description: Name of the repository.
              isRequired: true
              order: 1
              type:
                kind: String
            repositoryOwner:
              kind: PropertyInfo
              displayName: Repository Owner
              description: Name of the repository owner.
              isRequired: true
              order: 0
              type:
                kind: String
            since:
              kind: PropertyInfo
              displayName: since
              description: Filter by issues after given date.
              order: 10
              type:
                kind: String
            sort:
              kind: PropertyInfo
              displayName: sort
              description: Field to sort results by.
              order: 8
              type:
                kind: String
            state:
              kind: PropertyInfo
              displayName: state
              description: Filter by state.
              order: 3
              type:
                kind: String
        outputType:
          kind: Table
          properties:
            Value:
              kind: PropertyInfo
              type:
                kind: Any
        operationId: GetIssues
